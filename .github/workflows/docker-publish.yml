name: Build and publish Docker image

# Publishes a multi-arch image to the GitHub Container Registry (GHCR) so it can
# be pulled on any NAS via a docker-compose stack. Runs on pushes to main and on
# version tags (v*). The image is published to ghcr.io/code-by-gunnar/squirrel.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Pinned rather than derived from ${{ github.repository }} so the image name
  # stays "squirrel" even though the repo was renamed to "squirrel.app".
  IMAGE_NAME: code-by-gunnar/squirrel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU (for arm64 builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GHCR can reject the extra attestation manifests with
          # "error writing layer blob: not_found"; disable them.
          provenance: false
          sbom: false
