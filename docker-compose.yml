services:
  squirrel:
    # This file builds from source (for development). For a NAS, paste the
    # prebuilt-image stack from the README instead:
    #   image: ghcr.io/code-by-gunnar/squirrel:latest
    build: .
    container_name: squirrel
    restart: unless-stopped
    ports:
      - "8480:3000"
    environment:
      # Set a password to require login. Leave unset for open access on a
      # trusted LAN. Change SESSION_SECRET to any long random string.
      APP_PASSWORD: "${APP_PASSWORD:-}"
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-long-random-string}"
      BASE_CURRENCY: "${BASE_CURRENCY:-GBP}"
      TZ: "${TZ:-Europe/London}"
    volumes:
      # SQLite database persists here across upgrades.
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional self-hosted ntfy so the default channel needs no third party.
  # Point Squirrel's "ntfy server" setting at http://ntfy (internal), and
  # subscribe your phone to http://YOUR-NAS-IP:8481/<topic>.
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: squirrel-ntfy
    command: serve
    environment:
      NTFY_BASE_URL: "${NTFY_BASE_URL:-http://localhost:8481}"
    ports:
      - "8481:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    restart: unless-stopped

volumes:
  ntfy-cache:
  ntfy-data:
